<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebContainer + Monaco 编辑器</title>
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
  <link rel="icon" href="data:," />
  <style>
    html, body { margin: 0; height: 100%; font-family: sans-serif; background: #1e1e1e; color: #eee; overflow: hidden; }
    #app { display: grid; grid-template-columns: 200px 1fr 1fr; grid-template-rows: 32px 1fr 240px; height: 100vh; gap: 1px; background: #333; }
    header { grid-column: 1 / 4; background: #252526; color: #ddd; padding: 6px 12px; font-size: 13px; line-height: 20px; }
    #files { background: #252526; overflow: auto; font-size: 12px; }
    #files ul { list-style: none; margin: 0; padding: 4px 0; }
    #files li { padding: 3px 10px; cursor: pointer; white-space: nowrap; color: #cccccc; }
    #files li:hover { background: #2a2d2e; }
    #files li.active { background: #094771; color: #fff; }
    #files .dirty::after { content: ' ●'; color: #e5c07b; }
    #editor { background: #1e1e1e; min-width: 0; }
    #preview { background: #fff; overflow: hidden; }
    #preview iframe { width: 100%; height: 100%; border: 0; }
    #terminal { grid-column: 1 / 4; background: #1e1e1e; padding: 4px; overflow: hidden; }
    #terminal .xterm { height: 100%; }
    .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <div id="app">
    <header>🚀 WebContainer + Monaco — 编辑左侧文件即时触发热更新</header>
    <div id="files"><div class="placeholder">加载中…</div></div>
    <div id="editor"></div>
    <div id="preview"><div class="placeholder">等待开发服务器就绪…</div></div>
    <div id="terminal"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
